apiVersion: lwp.io/v0.1
kind: LLMWorkspaceKind
metadata:
  name: doc_vault
  version: 1.0.0
spec:
  display:
    name: 文档管家
    icon: carbon:document
    description: 合同、票据、证件、说明书的档案库：每份文档都有类型、关键信息和到期提醒，再也不用翻文件夹
    color: "#f59e0b"
  default_landing: business/doc_vault
  capabilities:
    # 命令的工作流写在 prompts/cmd_<name>.md 中，按 file_path 字母序拼到对话开头 prompts 段
    skills:    []
    commands:  [index, search, expiry]
    subagents: []
  instance_schema:
    description:
      type: string
      optional: true
      description: 这个档案库放什么（如「家庭文档」「公司合同」；留空即通用）
  adapters:
    list: builtin/file_browser
    open: builtin/file_browser
  defaults:
    # 档案索引是 agent 跑出来的可重建产物
    gitignore:
      - ".llm/index/"
      - ".llm/state/"
