apiVersion: lwp.io/v0.1
kind: LLMWorkspaceKind
metadata:
  name: media_library
  version: 1.1.0

spec:
  display:
    name: 影视库
    icon: carbon:video
    description: NAS 上的电影/剧集目录变成可检索的影视库：识别片名年份季集、命名规范建议、观影清单
    color: "#ef4444"
  default_landing: business/media
  # 海报/截图常驻目录,自动出封面
  cover: latest_image
  capabilities:
    # 命令的工作流写在 prompts/cmd_<name>.md 中，按 file_path 字母序拼到对话开头 prompts 段
    skills:    []
    commands:  [index, search, organize]
    subagents: []
  instance_schema:
    description:
      type: string
      optional: true
      description: 这个库放什么（如「电影」「美剧」「纪录片」；留空即混合）
  adapters:
    list: builtin/file_browser
    open: builtin/file_browser
  defaults:
    gitignore:
      - ".llm/index/"
      - ".llm/state/"
