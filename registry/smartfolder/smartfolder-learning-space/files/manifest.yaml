apiVersion: lwp.io/v0.1
kind: LLMWorkspaceKind
metadata:
  name: learning_space
  version: 1.1.0

spec:
  display:
    name: 学习空间
    icon: carbon:education
    description: 把一堆学习材料（PDF/笔记/文章/课件）变成一个会陪你学的空间：消化成笔记、生成大纲、出题、按遗忘曲线复习
    color: "#22c55e"
  default_landing: business/learning_space
  capabilities:
    # 命令的工作流写在 prompts/cmd_<name>.md 中，按 file_path 字母序拼到对话开头 prompts 段
    skills:    []
    commands:  [digest, outline, quiz, review]
    subagents: []
  instance_schema:
    subject:
      type: string
      optional: false
      description: 学习主题（如「线性代数」「Go 并发」「日语 N3」）
    goal:
      type: string
      optional: true
      description: 学习目标（一句话，如「两个月内能读懂论文里的矩阵推导」）
    level:
      type: "enum:[beginner,intermediate,advanced]"
      optional: true
      default: beginner
      description: 当前水平
  adapters:
    list: builtin/file_browser
    open: builtin/file_browser
  defaults:
    # 笔记/材料抽取是可重建缓存，水位是运行态 → gitignore；
    # 抽认卡(flashcard)是 scoped 实体（持久学习资产），不 gitignore
    gitignore:
      - ".llm/index/"
      - ".llm/state/"
