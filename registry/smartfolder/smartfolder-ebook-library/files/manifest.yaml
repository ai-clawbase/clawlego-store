apiVersion: lwp.io/v0.1
kind: LLMWorkspaceKind
metadata:
  name: ebook_library
  version: 1.1.0

spec:
  display:
    name: 书库
    icon: carbon:book
    description: 电子书目录变成可检索的书库：识别书名作者、按主题上架、生成书单与读后摘记
    color: "#8b5cf6"
  default_landing: business/books
  # 书封图常见(同名 cover.jpg / calibre 结构),自动出封面
  cover: latest_image
  capabilities:
    # 命令的工作流写在 prompts/cmd_<name>.md 中，按 file_path 字母序拼到对话开头 prompts 段
    skills:    []
    commands:  [index, search, shelf]
    subagents: []
  instance_schema:
    description:
      type: string
      optional: true
      description: 这个书库的定位（如「技术书」「小说」；留空即混合）
  adapters:
    list: builtin/file_browser
    open: builtin/file_browser
  defaults:
    gitignore:
      - ".llm/index/"
      - ".llm/state/"
