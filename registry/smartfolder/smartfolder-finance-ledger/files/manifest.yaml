apiVersion: lwp.io/v0.1
kind: LLMWorkspaceKind
metadata:
  name: finance_ledger
  # Template version (semver). Bumped whenever the kind ships new prompts,
  # schemas, or a migration. An instance records the version it was created /
  # last migrated to in .llm/data/_template.json; /upgrade walks the gap.
  version: 2.0.0

spec:
  display:
    name: 账本
    icon: carbon:wallet
    description: 多账户记账、预算盯防、净值与现金流、周期账单与报销跟踪;拖入账单截图/CSV 即可批量入账,账目永远是你的文件
    color: "#eab308"
  default_landing: business/ledger
  capabilities:
    # 每条命令的工作流写在 prompts/cmd_<name>.md;按文件名字母序拼到对话开头 prompts 段。
    # 技能 = LLM 侧能力包(厂商 SKILL.md 格式),承接模糊/多模态半边;函数承接确定半边。
    # receipt-ocr:把拖入的票据图片/PDF 抽成账目候选,确认后交 entity.upsert 落库。
    # 随 mod 安装到 system/skills/receipt-ocr/SKILL.md。
    skills:    [receipt-ocr]
    commands:  [record, report, budget, account, recurring, reimburse, goal, import, search, index, upgrade, migrate, panel]
    subagents: []
  # 命令执行模式覆盖(clawfn,见 _design/clawfn.md)。未列出的命令默认 mode:prompt
  # (走 prompts/cmd_<name>.md + LLM,与现状一致)。function 模式直接执行函数、免 LLM。
  # /panel 即为最佳实践示范:用通用内置函数 sys.dashboard 即时渲染本文件夹工作台面板。
  # /report、/index 绑定到本 mod 携带的 Risor 脚本(functions/report.risor、
  # functions/reindex.risor,按文件名自动注册为 finance_ledger.report / .reindex)——
  # 账本聚合从"逐 token 让模型现算"换成代码确定性现算,永不漂移、零 token。
  command_specs:
    - { name: panel, mode: function, run: sys.dashboard, summary: 打开账本工作台面板(免 LLM,即时渲染) }
    # /report:查 transaction 实体,聚合所选月份(位置参数或 month=,缺省最近月)的分类支出,
    # 内联渲染报表面板(bubble)。
    - { name: report, mode: function, run: report, summary: 月度分类报表(免 LLM,即时) }
    # /index:重建派生层 .llm/index/{monthly,accounts_balance,_index}.json 并用最新聚合
    # 确定性刷新工作台总览/报表/账户三页(保留预算页)。
    - { name: index, mode: function, run: reindex, summary: 重建索引并刷新工作台(免 LLM) }
    # /migrate:把历史账目从 .llm/data/records/*.jsonl 一次性、确定性地迁入 scoped 实体库
    # .llm/entities/transaction(按 id 去重,幂等可重跑,原文件保留作备份)。通用内置函数
    # entity.import_jsonl + 清单静态 params 驱动,无需 mod 携带任何 Go/脚本代码。
    - name: migrate
      mode: function
      run: entity.import_jsonl
      summary: 把历史账目迁入实体库(免 LLM,幂等)
      params:
        entity: transaction
        display: 账目
        glob: .llm/data/records/*.jsonl
  instance_schema:
    # 字段名保持与 v1 一致(currency/description),旧实例的 manifest fields 无需迁移。
    currency:
      type: string
      optional: true
      default: CNY
      description: 记账本位币(净值/跨币种统计都换算到它);单条账目可用其他币种并记录汇率
    description:
      type: string
      optional: true
      description: 这本账记什么(如「家庭开销」「项目经费」;留空即通用)
  adapters:
    list: builtin/file_browser
    open: builtin/file_browser
  # 卡片封面回退到最近的图片(账单截图等)。该 kind 自带一个 .llm/ui A2UI 工作台
  # 视图(总览/报表/预算/账户);/index(reindex 脚本)用最新聚合确定性重写
  # schema.json,/panel(sys.dashboard)即时渲染当前 schema。
  cover: latest_image
