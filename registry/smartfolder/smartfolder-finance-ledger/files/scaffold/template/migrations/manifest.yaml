# 迁移清单 —— /upgrade 的路线图。
#
# 模板随 mod 升级被整体替换(prompts/schemas/migrations 永远是最新)。实例的
# .llm/ 数据原地保留;/upgrade 读实例 .llm/data/_template.json 的 template_version,
# 在此清单里找出 (实例版本, current] 之间的迁移,按顺序执行,跑完更新 _template.json。
#
# 设计原则(所有 kind 通用,见 _design/smartspace-template-versioning.md):
#  - 迁移只动「真相层(records 仅追加/补默认)+ 设置层(.llm/data 增字段补默认)」。
#  - 派生层(.llm/index、.llm/cache)从不迁移:跑完迁移直接重建/按内容哈希复用。
#  - 每条迁移必须幂等可重跑(先探测再改),并在动手前自动备份到 .llm/backups/。

schema_version: 1
current: 2.0.0          # == kind manifest.yaml metadata.version
data_schema_version: 2  # 当前数据 schema 整数版本

migrations:
  - id: v1-to-v2
    from: "<2.0.0"        # 适用于 template_version 低于 2.0.0 的实例(含无 _template.json 的 v1)
    to: "2.0.0"
    data_schema: 2
    auto: true            # 纯增量、可重建,可在无需用户确认下自动执行
    rebuild_index: true   # 跑完后清空 .llm/index 并 /index 重建
    backup: true          # 动手前备份 .llm/data/records/ 与 .llm/data/ 到 .llm/backups/<from>-<ts>/
    summary: >
      从「单账户、按月 JSONL」升级到「多账户 / 转账 / 标签 / 报销 / 周期账单 /
      储蓄目标 / 多币种 / 净值与现金流」。旧账目零改写:补建默认账户与 state 文件,
      旧行在读取时按默认值解释;附件解析缓存按内容哈希自然留存。
    playbook: v1-to-v2.md
