apiVersion: lwp.io/v0.1
kind: LLMWorkspaceKind
metadata:
  name: meeting_notes
  version: 1.1.0

spec:
  display:
    name: 会议空间
    icon: carbon:group-presentation
    description: 会议转写稿/速记丢进来,自动出纪要;行动项有人有期限可追踪;跨会议查谁说过什么
    color: "#6366f1"
  default_landing: business/meetings
  capabilities:
    # 命令的工作流写在 prompts/cmd_<name>.md 中，按 file_path 字母序拼到对话开头 prompts 段
    skills:    []
    commands:  [digest, actions, search]
    subagents: []
  instance_schema:
    description:
      type: string
      optional: true
      description: 这个空间放哪类会（如「团队周会」「客户会议」；留空即混合）
  adapters:
    list: builtin/file_browser
    open: builtin/file_browser
  defaults:
    gitignore:
      - ".llm/index/"
      - ".llm/state/"
