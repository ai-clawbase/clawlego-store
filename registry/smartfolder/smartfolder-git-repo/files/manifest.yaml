apiVersion: lwp.io/v0.1
kind: LLMWorkspaceKind
metadata:
  name: git_repo
  version: 1.1.0

spec:
  display:
    name: Git 仓库
    icon: carbon:repo
    description: 一个可 clone 和操作 Git 工作树的智能文件夹：状态、diff、分支、提交、拉取、推送、远端管理
    color: "#f97316"
  default_landing: business/git_repo
  capabilities:
    skills: []
    commands: [clone, status, diff, branch, commit, sync, remote]
    subagents: []
  instance_schema:
    repo_url:
      type: string
      optional: true
      description: 远端仓库 URL；用于 /clone 或校验 origin
    branch:
      type: string
      optional: true
      default: main
      description: 默认分支或新建空间后希望 checkout 的分支
    repo_path:
      type: relpath
      optional: true
      default: repo
      description: 工作树相对路径；新建空 SmartSpace 默认 clone 到 repo/，已有仓库 Promote 时可留空
    description:
      type: string
      optional: true
      description: 这个仓库的用途说明
  # 智能粘贴：一条 git clone 地址即可——自动识别仓库地址与名称，分支/路径/说明收进“高级”。
  form:
    smart_input:
      label: Git 克隆地址
      placeholder: 粘贴 git clone 地址，如 https://github.com/owner/repo.git
      hint: 粘贴后自动识别仓库名与地址；分支、子路径等可在“高级”里改
      parser: git_url
      sets:
        url: repo_url
      name_from: repo
    advanced: [branch, repo_path, description]
  adapters:
    list: builtin/file_browser
    open: builtin/file_browser
  defaults:
    gitignore:
      - ".llm/index/"
      - ".llm/state/"
