apiVersion: lwp.io/v0.1
kind: LLMWorkspaceKind
metadata:
  name: code_repo
  version: 1.0.0
spec:
  display:
    name: 智能代码库
    icon: carbon:code
    description: 把一个代码目录变成可导航、可检索、可问答的智能代码库：每个文件都有摘要、符号索引、依赖关系
    color: "#3b82f6"
  default_landing: business/code_repo
  capabilities:
    # 命令的工作流写在 prompts/cmd_<name>.md 中，按 file_path 字母序拼到对话开头 prompts 段
    skills:    []
    commands:  [map, search, explain, review]
    subagents: []
  instance_schema:
    language:
      type: string
      optional: true
      description: 主语言（如 go / typescript / python；留空则由 /map 自动判定）
    entry:
      type: relpath
      optional: true
      description: 入口文件或目录（实例根的相对路径，如 cmd/main.go / src）
    description:
      type: string
      optional: true
      description: 这个代码库是做什么的（一句话）
  adapters:
    list: builtin/file_browser
    open: builtin/file_browser
  defaults:
    # 索引/水位是 /map 跑出来的可重建缓存，加 gitignore 是默认建议；用户可自行覆盖
    gitignore:
      - ".llm/index/"
      - ".llm/state/"
